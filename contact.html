<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact – JENLISA</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- HEADER -->
  <header class="site-header">
    <div class="container header-inner">
      <div class="logo">
        <a href="index.html">JENLISA</a>
      </div>
      <nav class="main-nav">
        <ul>
          <li><a href="index.html">Home</a></li>
          <li><a href="about.html">About</a></li>
          <li><a href="gallery.html">Gallery</a></li>
          <li><a href="contact.html">Contact</a></li>
        </ul>
      </nav>
    </div>
  </header>

  <main>

    <!-- PAGE TITLE -->
    <section class="page-title section">
      <div class="container">
        <h1>Contact</h1>
      </div>
    </section>

    <!-- CONTACT FORM -->
    <section class="contact-form-section section">
      <div class="container">
        <form class="contact-form">

          <div class="form-group">
            <label for="name">Name</label>
            <input id="name" type="text" placeholder="Mahnoor Fatima">
          </div>

          <div class="form-group">
            <label for="email">Email</label>
            <input id="email" type="email" placeholder="Mahnoorxfatima@gmail.com">
          </div>

          <div class="form-group">
            <label for="subject">Subject</label>
            <input id="subject" type="text" placeholder="write..">
          </div>

          <div class="form-group">
            <label for="message">Message</label>
            <textarea id="message" placeholder="Write your message here..."></textarea>
          </div>

          <button type="submit">Send Message</button>

        </form>
      </div>
    </section>

  </main>

  <!-- FOOTER -->
  <footer class="site-footer">
    <div class="container">
      <p>© 2026 JENLISA. All rights reserved.</p>
    </div>
  </footer>

</body>
</html>
